<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found — Sharekit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0f;--bg2:#111118;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#f0f0f5;--muted:#8888a0;--accent:#6c63ff;--accent2:#a78bfa;--green:#22d3a0}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
    .blob{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0}
    .blob-1{width:500px;height:500px;background:rgba(108,99,255,0.1);top:-100px;left:-100px}
    .blob-2{width:400px;height:400px;background:rgba(34,211,160,0.07);bottom:-100px;right:-100px}
    .content{position:relative;z-index:1;max-width:500px}
    .error-num{font-family:'Syne',sans-serif;font-weight:800;font-size:7rem;letter-spacing:-0.05em;line-height:1;background:linear-gradient(135deg,var(--accent2),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:0.5rem}
    h1{font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;letter-spacing:-0.02em;margin-bottom:0.8rem}
    p{color:var(--muted);font-size:0.95rem;line-height:1.7;margin-bottom:2rem}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:0.75rem 1.6rem;border-radius:100px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:0.9rem;cursor:pointer;text-decoration:none;transition:all 0.2s;border:none}
    .btn-primary{background:var(--accent);color:#fff;box-shadow:0 0 20px rgba(108,99,255,0.3)}
    .btn-primary:hover{background:#7c74ff;transform:translateY(-1px)}
    .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border2)}
    .btn-ghost:hover{color:var(--text)}
    .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:2.5rem}
    .quick-links{display:flex;gap:1.5rem;justify-content:center;flex-wrap:wrap}
    .quick-links a{color:var(--muted);font-size:0.85rem;text-decoration:none;transition:color 0.2s}
    .quick-links a:hover{color:var(--accent2)}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;letter-spacing:-0.03em;color:var(--text);text-decoration:none;display:inline-flex;align-items:center;gap:8px;margin-bottom:3rem}
    .logo-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;box-shadow:0 0 8px var(--accent)}
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="content">
    <a href="index.html" class="logo"><span class="logo-dot"></span>Sharekit</a>
    <div class="error-num">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or may have been moved. If you're looking for a shared file, the link may have expired.</p>
    <div class="actions">
      <a href="index.html" class="btn btn-primary">Go to homepage</a>
      <a href="upload.html" class="btn btn-ghost">Share a file</a>
    </div>
    <div class="quick-links">
      <a href="features.html">Features</a>
      <a href="pricing.html">Pricing</a>
      <a href="faq.html">FAQ</a>
      <a href="login.html">Log in</a>
      <a href="signup.html">Sign up</a>
    </div>
  </div>
</body>
</html>
