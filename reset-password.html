<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — Sharekit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0f;--bg2:#111118;--bg3:#18181f;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);--text:#f0f0f5;--muted:#8888a0;--accent:#6c63ff;--accent2:#a78bfa;--green:#22d3a0}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
    .blob{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0}
    .blob-1{width:500px;height:500px;background:rgba(108,99,255,0.1);top:-150px;left:-100px}
    .blob-2{width:400px;height:400px;background:rgba(34,211,160,0.07);bottom:-100px;right:-50px}
    .card{position:relative;z-index:1;width:100%;max-width:420px;background:var(--bg2);border:1px solid var(--border2);border-radius:24px;padding:2.5rem}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;letter-spacing:-0.03em;color:var(--text);text-decoration:none;display:inline-flex;align-items:center;gap:8px;margin-bottom:2rem}
    .logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;box-shadow:0 0 10px var(--accent)}
    h1{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;letter-spacing:-0.03em;margin-bottom:0.3rem}
    .sub{color:var(--muted);font-size:0.88rem;margin-bottom:2rem}
    .form-row{margin-bottom:1.2rem}
    label{display:block;font-size:0.82rem;color:var(--muted);margin-bottom:6px}
    input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:0.75rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.95rem;transition:border-color 0.2s;outline:none}
    input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,0.12)}
    .strength-bar{height:4px;border-radius:100px;background:var(--bg3);margin-top:6px;overflow:hidden}
    .strength-fill{height:100%;border-radius:100px;transition:width 0.3s,background 0.3s;width:0%}
    .strength-label{font-size:0.72rem;margin-top:4px}
    .btn-primary{width:100%;padding:0.85rem;background:var(--accent);color:#fff;border:none;border-radius:100px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:1rem;cursor:pointer;transition:all 0.2s;box-shadow:0 0 24px rgba(108,99,255,0.3);margin-top:0.5rem;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-primary:hover{background:#7c74ff;transform:translateY(-1px)}
    .btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none}
    .alert{border-radius:10px;padding:10px 14px;font-size:0.85rem;margin-bottom:1rem;display:none}
    .alert.show{display:block}
    .alert-error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#fca5a5}
    .alert-success{background:rgba(34,211,160,0.1);border:1px solid rgba(34,211,160,0.25);color:var(--green)}
    .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .footer-text{text-align:center;font-size:0.85rem;color:var(--muted);margin-top:1.5rem}
    .footer-text a{color:var(--accent2);text-decoration:none}
    .invalid-link{text-align:center}
    .invalid-link .icon{font-size:3rem;margin-bottom:1rem}
    .invalid-link h2{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;margin-bottom:0.5rem}
    .invalid-link p{color:var(--muted);font-size:0.88rem;margin-bottom:1.5rem}
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card" id="mainCard">
    <a href="index.html" class="logo"><span class="logo-dot"></span>Sharekit</a>

    <!-- LOADING STATE -->
    <div id="stateLoading">
      <h1>Verifying link…</h1>
      <p class="sub">Please wait a moment.</p>
    </div>

    <!-- RESET FORM -->
    <div id="stateForm" style="display:none">
      <h1>Create new password</h1>
      <p class="sub">Enter your new password below. Make it strong!</p>

      <div class="alert alert-error" id="formError"></div>
      <div class="alert alert-success" id="formSuccess"></div>

      <div class="form-row">
        <label>New password</label>
        <input type="password" id="newPw" placeholder="Min 8 characters" oninput="checkStrength(this.value)" autocomplete="new-password"/>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-label" id="strengthLabel" style="color:var(--muted)"></div>
      </div>
      <div class="form-row">
        <label>Confirm new password</label>
        <input type="password" id="confirmPw" placeholder="Type it again" autocomplete="new-password"/>
      </div>

      <button class="btn-primary" id="resetBtn" onclick="doReset()">Set new password</button>
      <p class="footer-text" style="margin-top:1rem;"><a href="login.html">← Back to login</a></p>
    </div>

    <!-- INVALID LINK -->
    <div id="stateInvalid" style="display:none" class="invalid-link">
      <div class="icon">🔗</div>
      <h2>This link has expired</h2>
      <p>Password reset links are valid for 1 hour. Please request a new one from the login page.</p>
      <a href="login.html" style="display:inline-flex;padding:0.75rem 1.8rem;background:var(--accent);color:#fff;border-radius:100px;text-decoration:none;font-weight:500;font-size:0.9rem;">Request new link</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const sb = supabase.createClient(
      'https://pdgbanfrpztnsvnheaob.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkZ2JhbmZycHp0bnN2bmhlYW9iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMTk3MTEsImV4cCI6MjA5MTc5NTcxMX0.FtCy-o9fW6w1nMOwQO84TDtqN2ncFKtUrJ_kuHC6Hja'
    );

    // Supabase sends the token in the URL hash as #access_token=...&type=recovery
    async function init() {
      const hash   = window.location.hash;
      const params = new URLSearchParams(hash.replace('#',''));
      const type   = params.get('type');
      const token  = params.get('access_token');

      if (type === 'recovery' && token) {
        // Set the session from the recovery token
        const { error } = await sb.auth.setSession({
          access_token:  token,
          refresh_token: params.get('refresh_token') || '',
        });
        if (error) {
          showState('stateInvalid');
        } else {
          showState('stateForm');
        }
      } else {
        // Check if already logged in with a recovery session
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
          showState('stateForm');
        } else {
          showState('stateInvalid');
        }
      }
    }

    function showState(id) {
      ['stateLoading','stateForm','stateInvalid'].forEach(s => {
        document.getElementById(s).style.display = s === id ? 'block' : 'none';
      });
    }

    function checkStrength(val) {
      const fill  = document.getElementById('strengthFill');
      const label = document.getElementById('strengthLabel');
      if (!val) { fill.style.width='0%'; label.textContent=''; return; }
      let score = 0;
      if (val.length >= 8)  score++;
      if (val.length >= 12) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const levels = [
        {w:'20%',color:'#ef4444',text:'Too weak'},
        {w:'40%',color:'#f97316',text:'Weak'},
        {w:'60%',color:'#eab308',text:'Fair'},
        {w:'80%',color:'#22d3a0',text:'Strong'},
        {w:'100%',color:'#22d3a0',text:'Very strong ✓'},
      ];
      const l = levels[Math.min(score,4)];
      fill.style.width = l.w; fill.style.background = l.color;
      label.style.color = l.color; label.textContent = l.text;
    }

    function setBtn(loading, label) {
      const b = document.getElementById('resetBtn');
      b.disabled = loading;
      b.innerHTML = loading ? '<span class="spinner"></span>&nbsp;' + label : label;
    }

    function showMsg(id, msg, type) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.className = 'alert alert-' + type + ' show';
    }

    async function doReset() {
      const pw      = document.getElementById('newPw').value;
      const confirm = document.getElementById('confirmPw').value;

      if (!pw || pw.length < 8) { showMsg('formError','Password must be at least 8 characters.','error'); return; }
      if (pw !== confirm)        { showMsg('formError','Passwords do not match.','error'); return; }

      setBtn(true, 'Updating password…');
      document.getElementById('formError').className = 'alert';

      const { error } = await sb.auth.updateUser({ password: pw });

      setBtn(false, 'Set new password');

      if (error) {
        showMsg('formError', error.message, 'error');
        return;
      }

      showMsg('formSuccess', '✓ Password updated! Redirecting to login…', 'success');
      document.getElementById('newPw').value = '';
      document.getElementById('confirmPw').value = '';
      document.getElementById('resetBtn').style.display = 'none';

      setTimeout(() => {
        window.location.href = 'login.html';
      }, 2000);
    }

    init();
  </script>
</body>
</html>
