<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Sharekit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0a0a0f;--bg2:#111118;--bg3:#18181f;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);--text:#f0f0f5;--muted:#8888a0;--accent:#6c63ff;--accent2:#a78bfa;--green:#22d3a0; }
    body { background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem; }
    .blob { position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0; }
    .blob-1 { width:500px;height:500px;background:rgba(108,99,255,0.1);top:-150px;left:-100px; }
    .blob-2 { width:400px;height:400px;background:rgba(34,211,160,0.07);bottom:-100px;right:-50px; }
    .card { position:relative;z-index:1;width:100%;max-width:420px;background:var(--bg2);border:1px solid var(--border2);border-radius:24px;padding:2.5rem; }
    .logo { font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;letter-spacing:-0.03em;color:var(--text);text-decoration:none;display:inline-flex;align-items:center;gap:8px;margin-bottom:2rem; }
    .logo-dot { width:8px;height:8px;background:var(--accent);border-radius:50%;box-shadow:0 0 10px var(--accent); }
    h1 { font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;letter-spacing:-0.03em;margin-bottom:0.3rem; }
    .sub { color:var(--muted);font-size:0.88rem;margin-bottom:2rem; }
    .form-row { margin-bottom:1.2rem; }
    label { display:block;font-size:0.82rem;color:var(--muted);margin-bottom:6px; }
    input { width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:0.75rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.95rem;transition:border-color 0.2s;outline:none; }
    input:focus { border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,0.12); }
    .btn-primary { width:100%;padding:0.85rem;background:var(--accent);color:#fff;border:none;border-radius:100px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:1rem;cursor:pointer;transition:all 0.2s;box-shadow:0 0 24px rgba(108,99,255,0.3);margin-top:0.5rem;display:flex;align-items:center;justify-content:center;gap:8px; }
    .btn-primary:hover { background:#7c74ff;transform:translateY(-1px); }
    .btn-primary:disabled { opacity:0.6;cursor:not-allowed;transform:none; }
    .divider { display:flex;align-items:center;gap:12px;margin:1.5rem 0;color:var(--muted);font-size:0.8rem; }
    .divider::before,.divider::after { content:'';flex:1;height:1px;background:var(--border); }
    .google-btn { width:100%;padding:0.75rem;background:transparent;color:var(--text);border:1px solid var(--border2);border-radius:100px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:0.9rem;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:10px; }
    .google-btn:hover { background:rgba(255,255,255,0.05); }
    .google-btn:disabled { opacity:0.6;cursor:not-allowed; }
    .forgot { float:right;font-size:0.8rem;color:var(--accent2);text-decoration:none;cursor:pointer; }
    .forgot:hover { text-decoration:underline; }
    .footer-text { text-align:center;font-size:0.85rem;color:var(--muted);margin-top:1.5rem; }
    .footer-text a { color:var(--accent2);text-decoration:none; }
    .alert { border-radius:10px;padding:10px 14px;font-size:0.85rem;margin-bottom:1rem;display:none; }
    .alert.show { display:block; }
    .alert-error { background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#fca5a5; }
    .alert-success { background:rgba(34,211,160,0.1);border:1px solid rgba(34,211,160,0.25);color:var(--green); }
    .spinner { width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .reset-section { display:none; }
    .back-link { font-size:0.85rem;color:var(--accent2);cursor:pointer;display:inline-flex;align-items:center;gap:4px;margin-bottom:1.5rem; }
    .back-link:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="card">
    <a href="index.html" class="logo"><span class="logo-dot"></span>Sharekit</a>

    <!-- LOGIN -->
    <div id="loginSection">
      <h1>Welcome back</h1>
      <p class="sub">Log in to your Sharekit account.</p>
      <div class="alert alert-error" id="loginError"></div>
      <div class="alert alert-success" id="loginSuccess"></div>
      <div class="form-row">
        <label>Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-row">
        <label>Password <span class="forgot" onclick="showReset()">Forgot password?</span></label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn-primary" id="loginBtn" onclick="handleLogin()">Log in</button>
      <p class="footer-text" style="margin-top:0.8rem;font-size:0.8rem;color:var(--muted);">Sign in with email and password only.</p>
      <p class="footer-text">Don't have an account? <a href="signup.html">Sign up free</a></p>
    </div>

    <!-- RESET PASSWORD -->
    <div class="reset-section" id="resetSection">
      <span class="back-link" onclick="showLogin()">← Back to login</span>
      <h1>Reset password</h1>
      <p class="sub">We'll send a reset link to your email.</p>
      <div class="alert alert-error" id="resetError"></div>
      <div class="alert alert-success" id="resetSuccess"></div>
      <div class="form-row">
        <label>Email address</label>
        <input type="email" id="resetEmail" placeholder="you@example.com" />
      </div>
      <button class="btn-primary" id="resetBtn" onclick="handleReset()">Send reset link</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const sb = supabase.createClient(
      'https://pdgbanfrpztnsvnheaob.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkZ2JhbmZycHp0bnN2bmhlYW9iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMTk3MTEsImV4cCI6MjA5MTc5NTcxMX0.FtCy-o9fW6w1nMOwQO84TDtqN2ncFKtUrJ_kuHC6hJA'
    );

    // Redirect if already logged in
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'dashboard.html';
    });

    function showReset() { document.getElementById('loginSection').style.display='none'; document.getElementById('resetSection').style.display='block'; }
    function showLogin() { document.getElementById('loginSection').style.display='block'; document.getElementById('resetSection').style.display='none'; }

    function showMsg(id, msg, type) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.className = 'alert alert-' + type + ' show';
    }

    function setBtn(id, loading, label) {
      const b = document.getElementById(id);
      b.disabled = loading;
      b.innerHTML = loading ? '<span class="spinner"></span>&nbsp;' + label : label;
    }

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('password').value;
      if (!email || !pass) { showMsg('loginError','Please fill in both fields.','error'); return; }

      setBtn('loginBtn', true, 'Logging in…');
      document.getElementById('loginError').className = 'alert';

      const { error } = await sb.auth.signInWithPassword({ email, password: pass });

      if (error) {
        setBtn('loginBtn', false, 'Log in');
        const msg = error.message.includes('Invalid') ? 'Wrong email or password. Try again.'
                  : error.message.includes('confirmed') ? 'Please verify your email first — check your inbox.'
                  : error.message;
        showMsg('loginError', msg, 'error');
        return;
      }
      showMsg('loginSuccess', 'Login successful! Redirecting to dashboard…', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 900);
    } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/dashboard.html' }
      });
      if (error) { setBtn('googleBtn', false, 'Continue with Google'); showMsg('loginError', 'Google login failed. Try email login.', 'error'); }
    }

    async function handleReset() {
      const email = document.getElementById('resetEmail').value.trim();
      if (!email) { showMsg('resetError','Enter your email address.','error'); return; }
      setBtn('resetBtn', true, 'Sending…');
      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/reset-password.html'
      });
      setBtn('resetBtn', false, 'Send reset link');
      if (error) { showMsg('resetError', error.message, 'error'); return; }
      showMsg('resetSuccess', '✓ Reset link sent! Check your inbox and spam folder.', 'success');
    }

    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      if (document.getElementById('resetSection').style.display === 'block') handleReset();
      else handleLogin();
    });
  </script>
</body>
</html>
